services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      PM_DATABASE_PATH: /app/data/app.db
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

volumes:
  backend-data: